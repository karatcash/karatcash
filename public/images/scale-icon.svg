<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="scale-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B96A"/>
      <stop offset="100%" stop-color="#C5A55A"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="30" y="104" width="60" height="8" rx="4" fill="#2D3442"/>
  <!-- Base plate top -->
  <rect x="38" y="100" width="44" height="6" rx="3" fill="#3D4558"/>

  <!-- Center pole -->
  <rect x="58" y="30" width="4" height="72" rx="2" fill="#2D3442"/>

  <!-- Top cap -->
  <rect x="52" y="26" width="16" height="6" rx="3" fill="#2D3442"/>

  <!-- Fulcrum pivot point -->
  <circle cx="60" cy="44" r="5" fill="url(#scale-gold)"/>
  <circle cx="60" cy="44" r="2.5" fill="#2D3442"/>

  <!-- Crossbeam — balanced -->
  <rect x="14" y="41" width="92" height="4" rx="2" fill="#2D3442"/>

  <!-- Left arm attachment -->
  <rect x="14" y="41" width="4" height="4" rx="1" fill="#3D4558"/>
  <!-- Right arm attachment -->
  <rect x="102" y="41" width="4" height="4" rx="1" fill="#3D4558"/>

  <!-- Left hanging chain -->
  <line x1="16" y1="45" x2="22" y2="66" stroke="#2D3442" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="66" x2="16" y2="66" stroke="#2D3442" stroke-width="2"/>
  <!-- Right hanging chain -->
  <line x1="104" y1="45" x2="98" y2="66" stroke="#2D3442" stroke-width="2" stroke-linecap="round"/>
  <line x1="98" y1="66" x2="104" y2="66" stroke="#2D3442" stroke-width="2"/>

  <!-- Left pan -->
  <path d="M6,66 Q19,78 32,66" fill="none" stroke="#2D3442" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M6,66 Q19,70 32,66" fill="url(#scale-gold)" opacity="0.6"/>
  <!-- Left pan rim lines -->
  <line x1="6" y1="66" x2="32" y2="66" stroke="url(#scale-gold)" stroke-width="2" stroke-linecap="round"/>

  <!-- Right pan -->
  <path d="M88,66 Q101,78 114,66" fill="none" stroke="#2D3442" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88,66 Q101,70 114,66" fill="url(#scale-gold)" opacity="0.6"/>
  <line x1="88" y1="66" x2="114" y2="66" stroke="url(#scale-gold)" stroke-width="2" stroke-linecap="round"/>

  <!-- Small gold item on left pan -->
  <rect x="11" y="62" width="10" height="5" rx="1" fill="url(#scale-gold)"/>

  <!-- Gold accent on beam -->
  <rect x="56" y="41" width="8" height="4" rx="1" fill="url(#scale-gold)" opacity="0.5"/>
</svg>
