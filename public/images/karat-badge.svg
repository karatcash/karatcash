<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="badge-grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#E8D08A"/>
      <stop offset="45%" stop-color="#D4B96A"/>
      <stop offset="100%" stop-color="#C5A55A"/>
    </linearGradient>
    <linearGradient id="badge-fill" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#1A1F2B"/>
      <stop offset="100%" stop-color="#2D3442"/>
    </linearGradient>
  </defs>

  <!-- Outer decorative ring — serrated / starburst border -->
  <!-- 16-point star for badge outer edge -->
  <polygon points="
    60,4  66,16  78,10  76,24  90,22  84,34  98,36  88,46
    100,52  88,58  96,70  82,70  82,84  68,80  64,94  56,82
    44,92  40,78  26,80  28,66  14,64  24,54  12,46  26,44
    20,32  34,32  34,18  46,24  52,10
  " fill="url(#badge-grad)" opacity="0.9"/>

  <!-- Inner circle — dark fill -->
  <circle cx="60" cy="60" r="40" fill="url(#badge-fill)"/>

  <!-- Inner circle border -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="url(#badge-grad)" stroke-width="2"/>

  <!-- Thin decorative ring inside -->
  <circle cx="60" cy="60" r="35" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.5"/>

  <!-- "24" — large numeral -->
  <text x="60" y="58"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="700"
        fill="url(#badge-grad)"
        text-anchor="middle" dominant-baseline="middle"
        letter-spacing="-1">24</text>

  <!-- "K" — smaller, below -->
  <text x="60" y="74"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="600"
        fill="#C5A55A"
        text-anchor="middle" dominant-baseline="middle"
        letter-spacing="4">K</text>

  <!-- Decorative line above "24" -->
  <line x1="38" y1="40" x2="82" y2="40" stroke="#C5A55A" stroke-width="0.8" opacity="0.5"/>
  <!-- Decorative line below "K" -->
  <line x1="38" y1="82" x2="82" y2="82" stroke="#C5A55A" stroke-width="0.8" opacity="0.5"/>

  <!-- Corner accent dots on inner ring -->
  <circle cx="60" cy="22" r="2" fill="#D4B96A" opacity="0.7"/>
  <circle cx="60" cy="98" r="2" fill="#D4B96A" opacity="0.7"/>
  <circle cx="22" cy="60" r="2" fill="#D4B96A" opacity="0.7"/>
  <circle cx="98" cy="60" r="2" fill="#D4B96A" opacity="0.7"/>
</svg>
